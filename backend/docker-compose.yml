services:
  postgres:
    image: postgres:latest
    container_name: postgres_sps_test
    ports:
      - "${PG_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DATABASE:-SPS_TEST}
    # Postgres 18+ espera o volume em /var/lib/postgresql (não em .../data)
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
    driver: local
